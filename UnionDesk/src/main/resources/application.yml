spring:
  application:
    name: uniondesk
  datasource:
    url: jdbc:mysql://localhost:3306/uniondesk?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: uniondesk
    password: uniondesk
  flyway:
    enabled: true
    validate-on-migrate: false
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
