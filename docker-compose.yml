services:
  mysql:
    image: mysql:8.0
    container_name: uniondesk-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uniondesk
      MYSQL_USER: uniondesk
      MYSQL_PASSWORD: uniondesk
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: uniondesk-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: uniondesk-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  minio-data:
